# Run backend without PostgreSQL (in-memory H2). Use: SPRING_PROFILES_ACTIVE=local
spring.datasource.url=jdbc:h2:mem:wellness;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# H2 reserves "month", "value", etc.; quote all identifiers
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.h2.console.enabled=true
spring.jpa.show-sql=false

server.port=8080
ml.service.url=${ML_SERVICE_URL:http://localhost:5002}
